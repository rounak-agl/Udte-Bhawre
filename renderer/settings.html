<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage MCP Servers</title>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: #1a1a1a;
      color: #e0e0e0;
      margin: 0;
      padding: 20px;
      user-select: none;
    }
    h2 { margin-top: 0; color: #ff6600; font-weight: 600; }
    p { font-size: 13px; color: #aaa; margin-bottom: 20px; }
    
    /* Server List */
    #server-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 30px;
    }
    .server-card {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .server-info h4 { margin: 0 0 4px 0; color: #fff; font-size: 14px; }
    .server-info code { font-size: 11px; color: #ff6600; background: #111; padding: 2px 6px; border-radius: 4px; }
    .delete-btn {
      background: transparent;
      border: 1px solid #ff4444;
      color: #ff4444;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    .delete-btn:hover { background: #ff4444; color: #fff; }

    /* Add Server Form */
    .add-form {
      background: #222;
      padding: 16px;
      border-radius: 8px;
      border: 1px dashed #555;
    }
    .add-form h3 { margin: 0 0 12px 0; font-size: 15px; }
    .input-group { margin-bottom: 12px; }
    .input-group label { display: block; font-size: 12px; margin-bottom: 4px; color: #aaa; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      background: #111;
      border: 1px solid #444;
      color: #fff;
      border-radius: 4px;
      font-family: monospace;
    }
    input:focus { outline: none; border-color: #ff6600; }
    .save-btn {
      width: 100%;
      background: #ff6600;
      color: #000;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }
    .save-btn:hover { background: #ff8533; }
  </style>
</head>
<body>

  <h2>MCP Servers</h2>
  <p>Connect official tools (Filesystem, GitHub, Postgres) to your assistant.</p>

  <div id="server-list">
    </div>

  <div class="add-form">
    <h3>+ Add New Server</h3>
    <form id="add-server-form">
      <div class="input-group">
        <label>Server Identifier (e.g., github, filesystem)</label>
        <input type="text" id="input-name" required placeholder="local-filesystem">
      </div>
      <div class="input-group">
        <label>Command</label>
        <input type="text" id="input-command" required placeholder="npx" value="npx">
      </div>
      <div class="input-group">
        <label>Arguments (comma separated)</label>
        <input type="text" id="input-args" required placeholder="-y, @modelcontextprotocol/server-filesystem, /path/to/folder">
      </div>
      <div class="input-group">
        <label>Environment Variables (JSON format, optional)</label>
        <input type="text" id="input-env" placeholder='{"GITHUB_PERSONAL_ACCESS_TOKEN": "ghp_..."}'>
      </div>
      <button type="submit" class="save-btn">Add & Restart Session</button>
    </form>
  </div>

  <script src="settings.js"></script>
</body>
</html>
