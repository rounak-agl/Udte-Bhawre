<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="overlay.css">
  <style>
    /* Override overlay.css pointer-events none */
    html, body {
      pointer-events: auto;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    #step-panel {
      position: relative !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      display: flex;
      flex-direction: column;
      margin: 0;
      box-shadow: none;
      animation: none;
    }
  </style>
</head>
<body>
  <div id="step-panel">
    <div class="step-header">
      <span class="step-badge" id="step-badge">1</span>
      <span class="step-title" id="step-title">Step</span>
    </div>
    <div class="step-instruction" id="step-instruction"></div>
    <div class="step-actions">
      <button id="btn-next" class="step-btn step-btn-next">Next →</button>
      <button id="btn-done" class="step-btn step-btn-done hidden">Done ✓</button>
      <button id="btn-dismiss" class="step-btn step-btn-dismiss">×</button>
    </div>
  </div>
  <script src="step-panel.js"></script>
</body>
</html>
